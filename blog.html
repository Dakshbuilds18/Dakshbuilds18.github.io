<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="blog">
  <main>
    <h1>Blog</h1>
    <p class="page-intro">Build logs, lessons learned, and notes from the workbench.</p>
    <div id="post-list"></div>
  </main>

  <script src="content/config.js"></script>
  <script src="content/posts.js"></script>
  <script src="js/site.js"></script>
  <script>
    const sorted = [...POSTS].sort(byDateDesc);
    document.getElementById("post-list").innerHTML = sorted.length
      ? sorted.map(postCard).join("")
      : '<p class="empty-note">No posts yet — add one in content/posts.js</p>';
  </script>
</body>
</html>

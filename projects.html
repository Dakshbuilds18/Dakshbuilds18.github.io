<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="projects">
  <main>
    <h1>Projects</h1>
    <p class="page-intro">Every project is documented end-to-end: the problem, design goals, research, challenges, failures, iterations, the final product, and what I'd improve.</p>
    <div class="card-grid" id="project-grid"></div>
  </main>

  <script src="content/config.js"></script>
  <script src="content/projects.js"></script>
  <script src="js/site.js"></script>
  <script>
    const sorted = [...PROJECTS].sort(byDateDesc);
    document.getElementById("project-grid").innerHTML = sorted.length
      ? sorted.map(projectCard).join("")
      : '<p class="empty-note">No projects yet — add one in content/projects.js</p>';
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="blog">
  <main>
    <article class="article" id="article"></article>
  </main>

  <script src="content/config.js"></script>
  <script src="content/posts.js"></script>
  <script src="js/md.js"></script>
  <script src="js/site.js"></script>
  <script>
    const post = POSTS.find(p => p.id === getParam("id"));
    const el = document.getElementById("article");

    if (!post) {
      el.innerHTML = '<h1>Post not found</h1><p><a href="blog.html">← Back to blog</a></p>';
    } else {
      document.title = post.title;
      el.innerHTML = `
        <p><a href="blog.html">← All posts</a></p>
        <h1>${post.title}</h1>
        <div class="article-meta">${fmtDate(post.date)} &nbsp; ${(post.tags || []).map(t => `<span class="tag">${t}</span>`).join(" ")}</div>
        <div class="md">${renderMarkdown(post.body)}</div>`;
    }
  </script>
</body>
</html>
